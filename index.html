<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Converter - Transform Your Images</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="min-h-screen p-4 md:p-8 bg-gradient-to-br from-blue-50 via-white to-purple-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900">
<div class="max-w-7xl mx-auto">
<div class="flex justify-between items-center mb-12 animate-in">
<div>
<h1 class="text-5xl md:text-6xl font-extrabold gradient-text mb-3 tracking-tight">Image Converter</h1>
<p class="text-lg text-gray-600 dark:text-gray-400">Transform your images instantly with AI-powered precision</p>
</div>
<button id="darkToggle" class="p-3 rounded-xl bg-white dark:bg-gray-800 shadow-lg hover:shadow-xl transition-all">
<svg id="sunIcon" class="w-6 h-6 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
<svg id="moonIcon" class="w-6 h-6 text-blue-400 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
</button>
</div>

<div id="error" class="hidden mb-6 p-4 bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500 text-red-700 dark:text-red-400 rounded-lg animate-in"></div>

<div class="grid lg:grid-cols-2 gap-8">
<div class="card rounded-2xl shadow-xl p-8 animate-in">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center icon-badge shadow-lg">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
</div>
<h2 class="text-2xl font-bold text-gray-800 dark:text-white">Upload Images</h2>
</div>
<div id="dropZone" class="drop-zone rounded-xl p-12 text-center cursor-pointer">
<svg class="w-16 h-16 mx-auto mb-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
<p class="text-lg font-semibold text-gray-700 dark:text-gray-300 mb-2">Drop your images here</p>
<p class="text-sm text-gray-500 dark:text-gray-400 mb-4">or click to browse files</p>
<div class="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
<svg class="w-4 h-4 text-blue-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
<span class="text-xs text-blue-600 dark:text-blue-400 font-medium">PNG, JPG, WEBP, GIF, BMP, ICO, TIFF</span>
</div>
<input type="file" id="fileInput" multiple accept="image/*" class="hidden">
</div>
<div id="preview" class="mt-6 hidden">
<div class="flex items-center justify-between mb-3">
<h3 class="font-semibold text-gray-700 dark:text-gray-300">Selected Files</h3>
<span id="fileCount" class="text-sm px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded-full font-medium"></span>
</div>
<div id="fileList" class="space-y-2 max-h-64 overflow-y-auto"></div>
</div>
</div>

<div class="card rounded-2xl shadow-xl p-8 animate-in">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center icon-badge shadow-lg">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
</div>
<h2 class="text-2xl font-bold text-gray-800 dark:text-white">Settings</h2>
</div>
<div class="space-y-5">
<div>
<label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Output Format</label>
<select id="format" class="input-field w-full p-3 rounded-xl font-medium">
<option value="PNG">PNG - Lossless</option>
<option value="JPEG">JPG - Compressed</option>
<option value="WEBP">WEBP - Modern</option>
<option value="GIF">GIF - Animated</option>
<option value="BMP">BMP - Bitmap</option>
<option value="ICO">ICO - Icon</option>
<option value="TIFF">TIFF - Professional</option>
</select>
</div>
<div id="qualitySection">
<label class="flex justify-between text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
<span>Quality</span>
<span id="qualityValue" class="text-blue-600 dark:text-blue-400">85%</span>
</label>
<input type="range" id="quality" min="1" max="100" value="85" class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-600">
</div>
<div class="border-t border-gray-200 dark:border-gray-700 pt-5">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input type="checkbox" id="resizeToggle" class="sr-only peer">
<div class="w-11 h-6 bg-gray-300 dark:bg-gray-600 rounded-full peer-checked:bg-blue-600 transition"></div>
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
</div>
<span class="text-sm font-semibold text-gray-700 dark:text-gray-300 group-hover:text-blue-600 transition">Enable Resize</span>
</label>
</div>
<div id="resizeSection" class="hidden space-y-4 p-4 bg-gray-50 dark:bg-gray-800/50 rounded-xl">
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">Width (px)</label>
<input type="number" id="width" placeholder="Auto" class="input-field w-full p-3 rounded-lg">
</div>
<div>
<label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-2">Height (px)</label>
<input type="number" id="height" placeholder="Auto" class="input-field w-full p-3 rounded-lg">
</div>
</div>
<label class="flex items-center gap-2 cursor-pointer">
<input type="checkbox" id="aspectLock" checked class="w-4 h-4 text-blue-600 rounded">
<span class="text-xs text-gray-600 dark:text-gray-400">Lock aspect ratio</span>
</label>
</div>
<button id="convertBtn" class="btn-primary w-full py-4 rounded-xl font-bold text-white text-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
<span class="flex items-center justify-center gap-2">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
Convert Images
</span>
</button>
<div id="progress" class="hidden">
<div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
<div id="progressBar" class="h-full bg-gradient-to-r from-blue-500 to-purple-600 transition-all duration-500" style="width:0%"></div>
</div>
</div>
</div>
</div>
</div>

<div id="result" class="hidden mt-8 card rounded-2xl shadow-xl p-8 animate-in">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center icon-badge shadow-lg">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
</div>
<h2 class="text-2xl font-bold text-gray-800 dark:text-white">Conversion Complete</h2>
</div>
<div id="resultContent" class="mb-6"></div>
<button id="downloadBtn" class="w-full py-4 rounded-xl font-bold text-white text-lg bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 shadow-lg hover:shadow-xl transition-all">
<span class="flex items-center justify-center gap-2">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
Download
</span>
</button>
</div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
